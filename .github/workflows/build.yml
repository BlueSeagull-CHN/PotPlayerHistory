name: 🎉 Build PotPlayerHistoryManager

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 读取 config.ini
      shell: pwsh
      run: |
        $content = Get-Content config.ini -Raw -Encoding UTF8
        $year = (Get-Date).Year
        $content = $content -replace '\{YEAR\}', $year
        $content | Set-Content config.ini -Encoding UTF8

        foreach ($line in $content -split "`n") {
          if ($line -match '^\s*([^#=]+?)\s*=\s*(.+?)\s*$') {
            $key = $matches[1].Trim()
            $value = $matches[2].Trim()
            "ENV:$key=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
        }

    - name: PyInstaller 打包
      run: |
        python -m PyInstaller `
          --onefile `
          --noconsole `
          --icon "${{ env.ICON_FILE }}" `
          --add-data "${{ env.ICON_FILE }};." `
          --name PotPlayerHistoryManager `
          --distpath . `
          --clean `
          "${{ env.MAIN_SCRIPT }}"

    - name: 上传打包结果
      uses: actions/upload-artifact@v4
      with:
        name: PotPlayerHistoryManager
        path: PotPlayerHistoryManager.exe

    - name: 显示结果
      run: dir PotPlayerHistoryManager.exe
