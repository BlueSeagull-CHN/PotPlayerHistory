name: 🎉 Build PotPlayerHistoryManager

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

# 强制使用 Node.js 24 运行所有 JavaScript Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 提升权限，允许创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      # 更新到 v4.2.2，该版本已明确支持 Node.js 24
      uses: actions/checkout@v4.2.2

    - name: 设置 Python
      # 更新到 v5.4.0，该版本已明确支持 Node.js 24
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.11'

    - name: 安装 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: PyInstaller 打包
      run: |
        python -m PyInstaller `
          --onefile `
          --noconsole `
          --icon "logo.ico" `
          --add-data "logo.ico;." `
          --name PotPlayerHistoryManager `
          --distpath . `
          --clean `
          --version-file version.txt `
          "PotPlayerHistoryManager.pyw"

    - name: 上传 Artifact
      # 更新到 v4.6.2，该版本已明确支持 Node.js 24
      uses: actions/upload-artifact@v4.6.2
      with:
        name: PotPlayerHistoryManager
        path: PotPlayerHistoryManager.exe

    - name: 读取发布配置
      id: release_config
      run: |
        # 从 release.json 读取配置
        $json = Get-Content release.json -Raw | ConvertFrom-Json
        echo "tag_name=v$($json.version)" >> $env:GITHUB_OUTPUT
        echo "release_name=$($json.name)" >> $env:GITHUB_OUTPUT
        echo "draft=$($json.draft)" >> $env:GITHUB_OUTPUT
        echo "prerelease=$($json.prerelease)" >> $env:GITHUB_OUTPUT
        echo "body<<EOF" >> $env:GITHUB_OUTPUT
        echo "$($json.body)" >> $env:GITHUB_OUTPUT
        echo "EOF" >> $env:GITHUB_OUTPUT

    - name: 发布到 GitHub Releases
      if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
      # 更新到 v2.2.2，该版本已明确支持 Node.js 24
      uses: softprops/action-gh-release@v2.2.2
      with:
        tag_name: ${{ steps.release_config.outputs.tag_name }}
        name: ${{ steps.release_config.outputs.release_name }}
        draft: ${{ steps.release_config.outputs.draft }}
        prerelease: ${{ steps.release_config.outputs.prerelease }}
        files: PotPlayerHistoryManager.exe
        body: ${{ steps.release_config.outputs.body }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
