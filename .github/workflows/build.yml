name: 🎉 Build PotPlayerHistoryManager

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

# 提升权限，允许创建 Release
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: PyInstaller 打包
      run: |
        python -m PyInstaller `
          --onefile `
          --noconsole `
          --icon "logo.ico" `
          --add-data "logo.ico;." `
          --name PotPlayerHistoryManager `
          --distpath . `
          --clean `
          "PotPlayerHistoryManager.pyw"

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PotPlayerHistoryManager
        path: PotPlayerHistoryManager.exe

    - name: 发布到 GitHub Releases
      if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: PotPlayerHistoryManager v1.0.0
        draft: false
        prerelease: false
        files: PotPlayerHistoryManager.exe
        body: |
          ### PotPlayer 播放位置记忆管理器 v1.0.0

          **下载**：`PotPlayerHistoryManager.exe`

          **主要功能**：
          - 自动加载 PotPlayer 配置文件
          - 关键词过滤与按日期搜索
          - 失效文件清理
          - 操作撤销功能
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
