name: 🎉 Build PotPlayerHistoryManager

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: PyInstaller 打包
      run: |
        python -m PyInstaller `
          --onefile `
          --noconsole `
          --icon "logo.ico" `
          --add-data "logo.ico;." `
          --name PotPlayerHistoryManager `
          --distpath . `
          --clean `
          "PotPlayerHistoryManager.pyw"

    - name: 上传打包文件
      uses: actions/upload-artifact@v4
      with:
        name: PotPlayerHistoryManager
        path: PotPlayerHistoryManager.exe

    - name: 显示打包结果
      run: dir PotPlayerHistoryManager.exe
