name: 🎉 Build PotPlayerHistoryManager

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装工具
      run: |
        python -m pip install --upgrade pip
        pip install nuitka pyinstaller

    - name: 读取并解析 config.ini
      shell: pwsh
      run: |
        $content = Get-Content config.ini -Raw -Encoding UTF8
        $year = (Get-Date).Year
        $content = $content -replace '\{YEAR\}', $year
        $content | Set-Content config.ini -Encoding UTF8

        echo "=== Config Content ==="
        echo $content

        echo "=== Setting Environment Variables ==="
        foreach ($line in $content -split "`n") {
          if ($line -match '^\s*([^#=]+?)\s*=\s*(.+?)\s*$') {
            $key = $matches[1].Trim()
            $value = $matches[2].Trim()
            echo "$key = $value"
            "ENV:$key=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
        }

    - name: 显示最终环境变量
      run: |
        echo "MAIN_SCRIPT     = ${{ env.MAIN_SCRIPT }}"
        echo "OUTPUT_NAME     = ${{ env.OUTPUT_NAME }}"
        echo "ICON_FILE       = ${{ env.ICON_FILE }}"
        echo "COMPANY_NAME    = ${{ env.COMPANY_NAME }}"
        echo "PRODUCT_NAME    = ${{ env.PRODUCT_NAME }}"

    - name: Nuitka 打包
      run: |
        python -m nuitka `
          --standalone `
          --onefile `
          --enable-plugin=tk-inter `
          --assume-yes-for-downloads `
          --output-filename="${{ env.OUTPUT_NAME }}" `
          --windows-icon-from-ico="${{ env.ICON_FILE }}" `
          --include-data-files="${{ env.ICON_FILE }}=./${{ env.ICON_FILE }}" `
          --windows-console-mode=disable `
          --company-name="${{ env.COMPANY_NAME }}" `
          --product-name="${{ env.PRODUCT_NAME }}" `
          --file-version="${{ env.FILE_VERSION }}" `
          --product-version="${{ env.FILE_VERSION }}" `
          --file-description="${{ env.FILE_DESCRIPTION }}" `
          --copyright="${{ env.COPYRIGHT }}" `
          "${{ env.MAIN_SCRIPT }}"
