name: 🎉 Build PotPlayerHistoryManager

on:
  push:
    branches: [ main, master ]
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装打包工具
      run: |
        python -m pip install --upgrade pip
        pip install nuitka pyinstaller

    - name: 读取 config.ini 并设置环境变量
      shell: pwsh
      run: |
        $config = Get-Content config.ini -Raw
        $year = (Get-Date).Year
        $config = $config -replace '\{YEAR\}', $year
        $config | Set-Content config.ini -Encoding UTF8

        # 解析 config.ini 到环境变量
        foreach ($line in $config -split "`n") {
          if ($line -match '^\s*([^#=]+?)\s*=\s*(.+?)\s*$') {
            $key = $matches[1].Trim()
            $value = $matches[2].Trim()
            "ENV:$key=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
        }

    - name: Nuitka 打包 (Release)
      run: |
        python -m nuitka --standalone --onefile --enable-plugin=tk-inter --assume-yes-for-downloads `
          --output-filename="${{ env.OUTPUT_NAME }}" `
          --windows-icon-from-ico="${{ env.ICON_FILE }}" `
          --include-data-files="${{ env.ICON_FILE }}=./${{ env.ICON_FILE }}" `
          --windows-console-mode=disable `
          --company-name="${{ env.COMPANY_NAME }}" `
          --product-name="${{ env.PRODUCT_NAME }}" `
          --file-version="${{ env.FILE_VERSION }}" `
          --product-version="${{ env.FILE_VERSION }}" `
          --file-description="${{ env.FILE_DESCRIPTION }}" `
          --copyright="${{ env.COPYRIGHT }}" `
          "${{ env.MAIN_SCRIPT }}"

    - name: 上传 Nuitka 打包结果
      uses: actions/upload-artifact@v4
      with:
        name: PotPlayerHistoryManager-Nuitka
        path: ${{ env.OUTPUT_NAME }}

    - name: PyInstaller 打包（图标兼容性更好）
      run: |
        python -m PyInstaller --onefile --noconsole `
          --icon="${{ env.ICON_FILE }}" `
          --add-data "${{ env.ICON_FILE }};." `
          --name PotPlayerHistoryManager `
          --distpath . `
          --clean `
          "${{ env.MAIN_SCRIPT }}"

    - name: 上传 PyInstaller 打包结果
      uses: actions/upload-artifact@v4
      with:
        name: PotPlayerHistoryManager-PyInstaller
        path: PotPlayerHistoryManager.exe

    - name: 发布到 Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.OUTPUT_NAME }}
          PotPlayerHistoryManager.exe
